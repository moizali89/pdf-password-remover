<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Password Remover</title>
  <link rel="stylesheet" href="/css/styles.css?v=2" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="logo">PDF Unlocker</h1>
      <p class="tagline">Remove the password from your PDF — locally, privately.</p>
    </header>

    <main class="card" id="app">

      <!-- Idle state -->
      <div id="state-idle">
        <div class="drop-zone" id="drop-zone" tabindex="0" role="button" aria-label="Drop PDF or click to browse">
          <svg class="drop-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="4" width="36" height="48" rx="4" fill="#e8eaf0" stroke="#c5c9d8" stroke-width="2"/>
            <rect x="16" y="20" width="20" height="2" rx="1" fill="#c5c9d8"/>
            <rect x="16" y="26" width="14" height="2" rx="1" fill="#c5c9d8"/>
            <circle cx="46" cy="46" r="14" fill="#4f6ef7"/>
            <path d="M46 40v12M40 46h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <p class="drop-label">Drop your PDF here</p>
          <p class="drop-sub">or <span class="link">click to browse</span></p>
          <p class="file-name" id="file-name" hidden></p>
          <input type="file" id="file-input" accept=".pdf" hidden />
        </div>

        <div class="field">
          <label for="password-input" class="field-label">PDF Password</label>
          <input type="password" id="password-input" class="field-input" placeholder="Enter password" autocomplete="current-password" />
        </div>

        <button class="btn-primary" id="unlock-btn">Unlock PDF</button>
        <p class="error-msg" id="error-msg" hidden></p>
      </div>

      <!-- Working state -->
      <div id="state-working" hidden>
        <div class="spinner" aria-label="Unlocking…"></div>
        <p class="working-label">Unlocking…</p>
      </div>

      <!-- Result state -->
      <div id="state-result" hidden>
        <div class="result-icon">✓</div>
        <p class="result-title">Your PDF is ready</p>
        <a class="btn-primary btn-download" id="download-link" download>Download</a>
        <button class="btn-ghost" id="reset-btn">Unlock another</button>
      </div>

    </main>

    <footer class="footer">All processing happens locally — no data leaves your computer.</footer>
  </div>

  <script src="/js/app.js?v=2"></script>
</body>
</html>
